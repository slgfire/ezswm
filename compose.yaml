services:
  ezswm:
    build: .
    container_name: ezswm
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - NUXT_JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - NUXT_DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
