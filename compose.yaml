# Default compose file — pulls the pre-built image from GHCR.
# No source checkout required, just this file and a JWT_SECRET.
#
# Usage:
#   export JWT_SECRET=$(openssl rand -hex 32)
#   docker compose pull && docker compose up -d
#
# For local development / building from source, use compose.dev.yaml:
#   docker compose -f compose.dev.yaml up --build
#
# Data lives in ./data on the host (bind mount). Inspect/backup directly.
# The container process runs as uid 1000 by default — if your host user
# isn't uid 1000, override via PUID/PGID and chown ./data accordingly:
#   sudo chown -R $PUID:$PGID ./data
# Or just run as root (PUID=0 PGID=0) — writes everywhere, no chown.

services:
  ezswm:
    image: ghcr.io/slgfire/ezswm:latest
    container_name: ezswm
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - NUXT_JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - NUXT_DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
