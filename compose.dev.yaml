# Development compose file — builds the image from the local source tree.
# Use this when iterating on the Dockerfile or testing unreleased changes.
#
# Usage:
#   export JWT_SECRET=dev-secret-change-me
#   docker compose -f compose.dev.yaml up --build
#
# See compose.yaml for PUID/PGID and bind-mount notes.

services:
  ezswm:
    build: .
    image: ezswm:dev
    container_name: ezswm-dev
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - NUXT_JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - NUXT_DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
