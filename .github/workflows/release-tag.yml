name: Auto Tag Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
          fetch-tags: true

      - name: Detect version bump
        id: detect
        run: |
          current=$(jq -r '.version' package.json)
          previous=$(git show HEAD~1:package.json 2>/dev/null | jq -r '.version' 2>/dev/null || echo "")
          tag="v${current}"
          echo "current=${current}"
          echo "previous=${previous}"
          if [ -z "${current}" ] || [ "${current}" = "null" ]; then
            echo "No version field found. Skipping."
            echo "should_tag=false" >> "$GITHUB_OUTPUT"
          elif [ "${current}" = "${previous}" ]; then
            echo "Version unchanged (${current}). Skipping."
            echo "should_tag=false" >> "$GITHUB_OUTPUT"
          elif git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists. Skipping."
            echo "should_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version bumped: ${previous} -> ${current}. Will tag ${tag}."
            echo "should_tag=true" >> "$GITHUB_OUTPUT"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "version=${current}" >> "$GITHUB_OUTPUT"
            echo "major_minor=${current%.*}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.detect.outputs.should_tag == 'true'
        run: |
          tag="${{ steps.detect.outputs.tag }}"
          git tag "${tag}"
          git push origin "${tag}"

      - name: Extract release notes from CHANGELOG
        if: steps.detect.outputs.should_tag == 'true'
        id: extract
        run: |
          ver="${{ steps.detect.outputs.version }}"
          notes_file="$(mktemp)"
          awk -v ver="${ver}" '
            $0 ~ "^## \\[" ver "\\]" {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG/en.md > "${notes_file}"
          if [ -s "${notes_file}" ]; then
            echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release with curated notes
        if: steps.detect.outputs.should_tag == 'true' && steps.extract.outputs.has_notes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.detect.outputs.tag }}"
          gh release create "${tag}" --title "${tag}" --notes-file "${{ steps.extract.outputs.notes_file }}"

      - name: Create release with auto-generated notes (fallback)
        if: steps.detect.outputs.should_tag == 'true' && steps.extract.outputs.has_notes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.detect.outputs.tag }}"
          gh release create "${tag}" --title "${tag}" --generate-notes

      # The tag above is pushed with GITHUB_TOKEN, which does not trigger the
      # docker.yml `v*` workflow. Build the versioned image here instead, from
      # the release commit, so every release ships a pinnable ghcr image.
      - name: Set up Docker Buildx
        if: steps.detect.outputs.should_tag == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: steps.detect.outputs.should_tag == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        if: steps.detect.outputs.should_tag == 'true'
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.detect.outputs.version }}
            type=raw,value=${{ steps.detect.outputs.major_minor }}
          labels: |
            org.opencontainers.image.version=${{ steps.detect.outputs.version }}

      - name: Build and push release images (latest + version)
        if: steps.detect.outputs.should_tag == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
