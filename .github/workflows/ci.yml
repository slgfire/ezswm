name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Nuxt
        run: npx nuxt prepare

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Nuxt
        run: npx nuxt prepare

      - name: Typecheck
        run: npx nuxt typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Nuxt
        run: npx nuxt prepare

      - name: Unit tests
        run: node --import tsx --test tests/*.test.ts

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    env:
      NUXT_JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start app
        run: |
          mkdir -p /tmp/ezswm-e2e-data
          NUXT_DATA_DIR=/tmp/ezswm-e2e-data PORT=3000 HOST=127.0.0.1 node .output/server/index.mjs > /tmp/ezswm-e2e.log 2>&1 &
          echo $! > /tmp/ezswm-e2e.pid

      - name: Wait for app
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/api/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/ezswm-e2e.log
          exit 1

      - name: Run Playwright smoke tests
        run: npx playwright test tests/e2e/settings.spec.ts tests/e2e/keyboard-shortcuts.spec.ts tests/e2e/subnet-calculator.spec.ts

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
            /tmp/ezswm-e2e.log
          if-no-files-found: ignore

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/ezswm-e2e.pid ]; then
            kill "$(cat /tmp/ezswm-e2e.pid)" || true
          fi

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, e2e]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
