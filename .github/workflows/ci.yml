name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        continue-on-error: true
        run: npx nuxt typecheck

      - name: Unit tests
        run: node --import tsx --test tests/*.test.ts

      - name: Build
        run: npm run build
