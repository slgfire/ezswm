name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Nuxt
        run: pnpm exec nuxt prepare

      - name: Lint
        run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Nuxt
        run: pnpm exec nuxt prepare

      - name: Typecheck
        run: pnpm exec nuxt typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Nuxt
        run: pnpm exec nuxt prepare

      - name: Unit tests
        run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    env:
      NUXT_JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Apply Prisma migrations
        run: |
          mkdir -p /tmp/ezswm-e2e-data
          DATABASE_URL="file:/tmp/ezswm-e2e-data/db.sqlite" pnpm prisma migrate deploy

      - name: Start app
        run: |
          DATABASE_URL="file:/tmp/ezswm-e2e-data/db.sqlite" NUXT_DATA_DIR=/tmp/ezswm-e2e-data PORT=3000 HOST=127.0.0.1 node .output/server/index.mjs > /tmp/ezswm-e2e.log 2>&1 &
          echo $! > /tmp/ezswm-e2e.pid

      - name: Wait for app
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/api/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/ezswm-e2e.log
          exit 1

      - name: Run Playwright smoke tests
        run: pnpm exec playwright test tests/e2e/settings.spec.ts tests/e2e/keyboard-shortcuts.spec.ts tests/e2e/subnet-calculator.spec.ts tests/e2e/route-smoke.spec.ts

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
            /tmp/ezswm-e2e.log
          if-no-files-found: ignore

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/ezswm-e2e.pid ]; then
            kill "$(cat /tmp/ezswm-e2e.pid)" || true
          fi

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, e2e]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
